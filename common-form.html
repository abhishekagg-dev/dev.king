<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - TravelWithFun</title>
<link rel="stylesheet" href="common-form.css">
</head>
<body>

<section class="contact-section">

  <div class="contact-wrap">

    <div class="contact-info">
    <a href="index.html">⬅Back</a>
      <span class="eyebrow">Get in touch</span>
      <h1>Let's plan your<br>next trip</h1>
      <p>Questions about a destination, a booking, or just want to say hi? Drop us a message and our team will get back to you within 24 hours.</p>

      <ul class="info-list">
        <li>
          <span class="info-icon">✉</span>
          <span>TravelwithFun@Gmail.com</span>
        </li>
        <li>
          <span class="info-icon">☎</span>
          <span>+91-xxx-xxxx-xxx</span>
        </li>
        <li>
          <span class="info-icon">⚑</span>
          <span>New Delhi,India</span>  
        </li>
      </ul>
    </div>

    <form class="contact-form" id="contactForm">
      <h2>Send a message</h2>

      <div class="form-row">
        <div class="form-group">
          <label for="fname">First name</label>
          <input type="text" id="fname" name="fname" placeholder="EnterName...." required>
        </div>
        <div class="form-group">
          <label for="lname">Last name</label>
          <input type="text" id="lname" name="lname" placeholder="TypeSurname...." required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="TypeMail..." >
      </div>

      <div class="form-group">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter MobileNo...."required>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject">
          <option value="">Select a topic</option>
          <option value="booking">Booking help</option>
          <option value="trip">Trip planning</option>
          <option value="feedback">Feedback</option>
          <option value="other">Other</option>
        </select>
      </div>

       <div class="form-row">
        <div class="form-group">
          <label for="Message">Messagw</label>
          <input type="text" id="fname" name="fname" placeholder="Tell us how can we help you......" required>
        </div>

      <button type="submit" class="submit-btn">Send Message</button>

      
    </form>

  </div>

</section>



</body>
</html>
